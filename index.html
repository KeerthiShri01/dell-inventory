<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Dell Inventory Manager</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <h1>Dell Inventory Manager</h1>

  <div class="section">
    <h2>Add Product</h2>
    <input type="text" id="product-input" placeholder="Enter product name" />
    <button onclick="addProduct()">Add</button>
  </div>

  <div class="section">
    <h2>Check Availability</h2>
    <input type="text" id="check-input" placeholder="Check product name" />
    <button onclick="checkAvailability()">Check</button>
    <p id="check-result"></p>
  </div>

  <div class="section">
    <h2>Inventory List</h2>
    <ul id="product-list"></ul>
  </div>

  <script src="app.js"></script>
</body>
</html>
